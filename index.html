<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Para Você ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060210;
    }

    .scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    canvas#starfield {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 40px 28px;
      gap: 36px;
    }

    /* CORAÇÃO CSS */
    .heart-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heart {
      width: 80px;
      height: 80px;
      position: relative;
      animation: heartbeat 2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px #e8507a99);
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 50px;
      height: 80px;
      background: linear-gradient(135deg, #ff6b9d, #e8385f, #c0214a);
      border-radius: 50px 50px 0 0;
      transform-origin: bottom center;
    }

    .heart::before {
      left: 40px;
      transform: rotate(-45deg);
    }

    .heart::after {
      left: 0;
      transform: rotate(45deg);
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15%       { transform: scale(1.2); }
      30%       { transform: scale(1); }
      45%       { transform: scale(1.1); }
      60%       { transform: scale(1); }
    }

    .halo {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1.5px solid #e8507a55;
      animation: halopulse 2s ease-in-out infinite;
    }

    .halo2 {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 1px solid #e8507a22;
      animation: halopulse 2s ease-in-out 0.4s infinite;
    }

    @keyframes halopulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(1.25); opacity: 0; }
    }

    /* POEMA */
    .poem {
      text-align: center;
      max-width: 420px;
    }

    .poem p {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(15px, 4vw, 18px);
      font-style: italic;
      color: #f0dfc8;
      line-height: 1.9;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadein 1.2s ease forwards;
    }

    .poem p:nth-child(1) { animation-delay: 0.4s; }
    .poem p:nth-child(2) { animation-delay: 0.9s; }
    .poem p:nth-child(3) { animation-delay: 1.4s; }
    .poem p:nth-child(4) { animation-delay: 1.9s; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e8507a88, transparent);
    }

    .signature {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: #f0dfc855;
      letter-spacing: 0.14em;
      opacity: 0;
      animation: fadein 1s ease 2.8s forwards;
    }
  </style>
</head>
<body>
  <div class="scene">
    <canvas id="starfield"></canvas>
    <div class="content">

      <div class="heart-wrap">
        <div class="halo2"></div>
        <div class="halo"></div>
        <div class="heart"></div>
      </div>

      <div class="poem">
        <p>Se Van Gogh pintasse tua presença,</p>
        <p>o céu ganharia outra cor,</p>
        <p>pois mil sóis desatariam a luz<br>que mora no teu olhar.</p>
        <p>Seria a noite em espiral,<br>onde cada estrela sonha em te tocar.</p>
      </div>

      <div class="divider"></div>
      <span class="signature">✦ para você ✦</span>

    </div>
  </div>

  <script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const NUM_STARS = 140;
    const stars = Array.from({length: NUM_STARS}, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.7 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.8,
    }));

    const swirls = [
      { cx: 0.15, cy: 0.2,  r: 80,  angle: 0, speed:  0.003, color: '#6e42c1' },
      { cx: 0.80, cy: 0.15, r: 60,  angle: 1, speed: -0.002, color: '#3b4dc7' },
      { cx: 0.5,  cy: 0.55, r: 100, angle: 2, speed:  0.002, color: '#c14264' },
      { cx: 0.2,  cy: 0.8,  r: 70,  angle: 3, speed: -0.003, color: '#a0327a' },
      { cx: 0.85, cy: 0.75, r: 65,  angle: 4, speed:  0.0025, color: '#1a8fa8' },
    ];

    let t = 0;

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      // fundo gradiente
      const grad = ctx.createRadialGradient(W*0.5, H*0.42, 0, W*0.5, H*0.42, W*0.9);
      grad.addColorStop(0, '#1a0a38');
      grad.addColorStop(0.5, '#0d0521');
      grad.addColorStop(1, '#060210');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // espirais van gogh
      swirls.forEach(s => {
        s.angle += s.speed;
        ctx.save();
        ctx.translate(s.cx * W, s.cy * H);
        ctx.rotate(s.angle);
        const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, s.r);
        sg.addColorStop(0,   s.color + '33');
        sg.addColorStop(0.5, s.color + '15');
        sg.addColorStop(1,   'transparent');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.ellipse(0, 0, s.r, s.r * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      // estrelas
      stars.forEach(st => {
        const blink = 0.5 + 0.5 * Math.sin(t * st.speed + st.phase);
        const alpha = 0.3 + 0.7 * blink;
        const r = st.r * (0.7 + 0.3 * blink);
        ctx.save();
        ctx.globalAlpha = alpha;
        const sg = ctx.createRadialGradient(st.x*W, st.y*H, 0, st.x*W, st.y*H, r * 3.5);
        sg.addColorStop(0,   '#fffbe8');
        sg.addColorStop(0.4, '#f0c87a66');
        sg.addColorStop(1,   'transparent');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.arc(st.x*W, st.y*H, r * 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fffde4';
        ctx.beginPath();
        ctx.arc(st.x*W, st.y*H, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      t += 0.018;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
