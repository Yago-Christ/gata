
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { background: transparent; }

  .scene {
    position: relative;
    width: 100%;
    min-height: 520px;
    border-radius: 18px;
    overflow: hidden;
    background: #0a0620;
  }

  canvas#starfield {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 520px;
    padding: 48px 32px;
    gap: 32px;
  }

  .heart-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .heart {
    width: 80px;
    height: 80px;
    position: relative;
    animation: heartbeat 2s ease-in-out infinite;
    filter: drop-shadow(0 0 18px #e8507a88);
  }

  .heart::before,
  .heart::after {
    content: '';
    position: absolute;
    width: 50px;
    height: 80px;
    background: linear-gradient(135deg, #ff6b9d, #e8385f, #c0214a);
    border-radius: 50px 50px 0 0;
    transform-origin: bottom center;
  }

  .heart::before {
    left: 40px;
    transform: rotate(-45deg);
  }

  .heart::after {
    left: 0;
    transform: rotate(45deg);
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.18); }
    30% { transform: scale(1); }
    45% { transform: scale(1.1); }
    60% { transform: scale(1); }
  }

  .halo {
    position: absolute;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 1.5px solid #e8507a44;
    animation: halopulse 2s ease-in-out infinite;
  }

  @keyframes halopulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.3); opacity: 0; }
  }

  .poem {
    text-align: center;
    max-width: 440px;
  }

  .poem p {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px;
    font-weight: 400;
    font-style: italic;
    color: #f0dfc8;
    line-height: 1.85;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadein 1.2s ease forwards;
  }

  .poem p:nth-child(1) { animation-delay: 0.3s; }
  .poem p:nth-child(2) { animation-delay: 0.7s; }
  .poem p:nth-child(3) { animation-delay: 1.1s; }
  .poem p:nth-child(4) { animation-delay: 1.5s; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e8507a99, transparent);
  }

  .signature {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: #f0dfc866;
    letter-spacing: 0.12em;
    opacity: 0;
    animation: fadein 1s ease 2.2s forwards;
  }
</style>

<div class="scene">
  <canvas id="starfield"></canvas>
  <div class="content">
    <div class="heart-wrap">
      <div class="halo"></div>
      <div class="heart"></div>
    </div>
    <div class="poem">
      <p>Se Van Gogh pintasse tua presença,</p>
      <p>o céu ganharia outra cor,</p>
      <p>pois mil sóis desatariam a luz<br>que mora no teu olhar.</p>
      <p>Seria a noite em espiral,<br>onde cada estrela sonha em te tocar.</p>
    </div>
    <div class="divider"></div>
    <span class="signature">✦ para você ✦</span>
  </div>
</div>

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');

function resize() {
  const parent = canvas.parentElement;
  canvas.width = parent.offsetWidth;
  canvas.height = parent.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

const NUM_STARS = 120;
const stars = Array.from({length: NUM_STARS}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.6 + 0.3,
  phase: Math.random() * Math.PI * 2,
  speed: 0.3 + Math.random() * 0.7,
}));

const SWIRLS = 5;
const swirls = Array.from({length: SWIRLS}, (_, i) => ({
  cx: 0.15 + Math.random() * 0.7,
  cy: 0.15 + Math.random() * 0.7,
  r: 40 + Math.random() * 60,
  angle: Math.random() * Math.PI * 2,
  speed: (Math.random() > 0.5 ? 1 : -1) * (0.002 + Math.random() * 0.003),
  color: ['#6e42c1','#3b4dc7','#1a8fa8','#c14264','#a0327a'][i % 5],
}));

let t = 0;
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const grad = ctx.createRadialGradient(W*0.5, H*0.4, 0, W*0.5, H*0.4, W*0.8);
  grad.addColorStop(0, '#1a0a38');
  grad.addColorStop(0.5, '#0d0521');
  grad.addColorStop(1, '#060210');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  swirls.forEach(s => {
    s.angle += s.speed;
    ctx.save();
    ctx.translate(s.cx * W, s.cy * H);
    ctx.rotate(s.angle);
    const sg = ctx.createRadialGradient(0,0,0,0,0,s.r);
    sg.addColorStop(0, s.color + '22');
    sg.addColorStop(0.5, s.color + '11');
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(0, 0, s.r, s.r * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  stars.forEach(st => {
    const blink = 0.5 + 0.5 * Math.sin(t * st.speed + st.phase);
    const alpha = 0.3 + 0.7 * blink;
    const r = st.r * (0.7 + 0.3 * blink);
    ctx.save();
    ctx.globalAlpha = alpha;
    const sg = ctx.createRadialGradient(st.x*W, st.y*H, 0, st.x*W, st.y*H, r*3);
    sg.addColorStop(0, '#fffbe8');
    sg.addColorStop(0.4, '#f0c87a88');
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(st.x*W, st.y*H, r*3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fffde4';
    ctx.beginPath();
    ctx.arc(st.x*W, st.y*H, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  t += 0.018;
  requestAnimationFrame(draw);
}
draw();
</script>
